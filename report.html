<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Smart Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="bg-white/80 backdrop-blur-md shadow-lg fixed w-full z-50 py-4">
    <div class="container flex justify-between">
      <h2 class="text-2xl font-bold text-indigo-600">SmartWaste | Reports</h2>
      <a href="admin.html" class="btn bg-indigo-600">Admin</a>
    </div>
  </nav>
  <div class="pt-20">
    <div class="container">
      <div class="card">
        <div class="flex justify-between items-center mb-8">
          <h1 class="text-3xl font-bold">Waste Reports</h1>
          <button onclick="exportCSV()" class="btn bg-green-600">📥 Export CSV</button>
        </div>
        <canvas id="reportChart" height="400"></canvas>
        <div id="reportTable" class="mt-8 overflow-x-auto"></div>
      </div>
    </div>
  </div>
  <script>
    new Chart(document.getElementById('reportChart'), {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr'],
        datasets: [{ label: 'Waste Collected (tons)', data: [120, 150, 180, 140], borderColor: '#8b5cf6', tension: 0.4 }]
      },
      options: { responsive: true }
    });
    function exportCSV() {
      const csv = 'Date,Waste Tons,Requests\n2026-03-01,120,45\n2026-03-15,150,60';
      const blob = new Blob([csv], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'waste-report.csv'; a.click();
    }
    document.getElementById('reportTable').innerHTML = `
      <table class="w-full border-collapse border border-gray-300">
        <thead><tr class="bg-gray-100"><th class="border p-3">Date</th><th class="border p-3">Tons</th><th class="border p-3">Status</th></tr></thead>
        <tbody><tr><td class="border p-3">2026-03-29</td><td class="border p-3">25</td><td class="border p-3">Optimized</td></tr></tbody>
      </table>`;
  </script>
</body>
</html>
