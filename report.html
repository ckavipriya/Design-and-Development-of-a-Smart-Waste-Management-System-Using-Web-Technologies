<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>Generate Report</h1><a href="index.html">Home</a></header>
  <div class="container">
    <div class="card">
      <h2>Summary</h2>
      <!-- Prediction Chart -->
<div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
  <h3 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-chart-line mr-3 text-yellow-400"></i>Fill Level Trends & Predictions</h3>
  <canvas id="trendChart" height="300"></canvas>
</div>
<!-- Add to <head> -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Export Button -->
<button onclick="exportPDF()" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white py-4 px-8 rounded-2xl font-bold hover:shadow-2xl fixed top-8 left-8 z-30 transition-all">
  📄 Export PDF
</button>

<script>
async function exportPDF() {
  try {
    // Target dashboard content
    const element = document.querySelector('main') || document.body;
    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#0f172a',
      logging: false
    });
    
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('landscape', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
    
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    pdf.save('SmartWaste-Dashboard.pdf');
    
    // Success toast
    showNotification('✅ PDF Exported!', 'Dashboard saved as PDF');
  } catch (error) {
    console.error('PDF Error:', error);
    alert('Export failed - try smaller section');
  }
}
</script>
<script>
new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: {
    labels: ['Today', 'Tomorrow', '+2d', '+3d', '+4d', '+5d', '+7d'],
    datasets: [{
      label: 'Predicted Fill %',
      data: [45, 62, 78, 89, 95, 100, 75],
      borderColor: '#f59e0b',
      backgroundColor: 'rgba(245, 158, 11, 0.1)',
      tension: 0.4,
      fill: true,
      pointBackgroundColor: '#f59e0b',
      pointBorderColor: '#fff',
      pointBorderWidth: 3,
      pointRadius: 8
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: 'white', font: { size: 16 } } } },
    scales: {
      y: { beginAtZero: true, max: 100, ticks: { color: 'white' }, grid: { color: 'white/20' } },
      x: { ticks: { color: 'white' }, grid: { color: 'white/20' } }
    },
    animation: { duration: 2000, easing: 'easeInOutQuart' }
  }
});
</script>
      <p>Full Bins: <span id="fullCount">0</span> | Avg Level: <span id="avgLevel">0</span>%</p>
      <button class="btn" onclick="alert('Report emailed to admin!')">Export PDF</button>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById('fullCount').textContent = bins.filter(b=>b.status==='Full').length;
    document.getElementById('avgLevel').textContent = Math.round(bins.reduce((a,b)=>a+b.level,0)/bins.length);
    const token = localStorage.getItem('userToken');
const role = localStorage.getItem('userRole');
if (!token || !role) {
  window.location.href = 'login.html';
} else {
  // Optional: Validate token age (1 day)
  const tokenTime = parseInt(token.split(':')[1]);
  if (Date.now() - tokenTime > 86400000) {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}
console.log('Logged in as:', role);
  </script>
</body>
</html>
