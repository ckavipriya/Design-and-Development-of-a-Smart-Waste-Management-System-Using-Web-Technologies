<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>Generate Report</h1><a href="index.html">Home</a></header>
  <div class="container">
    <div class="card">
      <h2>Summary</h2>
      <p>Full Bins: <span id="fullCount">0</span> | Avg Level: <span id="avgLevel">0</span>%</p>
      <button class="btn" onclick="alert('Report emailed to admin!')">Export PDF</button>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById('fullCount').textContent = bins.filter(b=>b.status==='Full').length;
    document.getElementById('avgLevel').textContent = Math.round(bins.reduce((a,b)=>a+b.level,0)/bins.length);
  </script>
</body>
</html>
