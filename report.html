<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>Generate Report</h1><a href="index.html">Home</a></header>
  <div class="container">
    <div class="card">
      <h2>Summary</h2>
      <!-- Prediction Chart -->
<div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
  <h3 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-chart-line mr-3 text-yellow-400"></i>Fill Level Trends & Predictions</h3>
  <canvas id="trendChart" height="300"></canvas>
</div>

<script>
new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: {
    labels: ['Today', 'Tomorrow', '+2d', '+3d', '+4d', '+5d', '+7d'],
    datasets: [{
      label: 'Predicted Fill %',
      data: [45, 62, 78, 89, 95, 100, 75],
      borderColor: '#f59e0b',
      backgroundColor: 'rgba(245, 158, 11, 0.1)',
      tension: 0.4,
      fill: true,
      pointBackgroundColor: '#f59e0b',
      pointBorderColor: '#fff',
      pointBorderWidth: 3,
      pointRadius: 8
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: 'white', font: { size: 16 } } } },
    scales: {
      y: { beginAtZero: true, max: 100, ticks: { color: 'white' }, grid: { color: 'white/20' } },
      x: { ticks: { color: 'white' }, grid: { color: 'white/20' } }
    },
    animation: { duration: 2000, easing: 'easeInOutQuart' }
  }
});
</script>
      <p>Full Bins: <span id="fullCount">0</span> | Avg Level: <span id="avgLevel">0</span>%</p>
      <button class="btn" onclick="alert('Report emailed to admin!')">Export PDF</button>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById('fullCount').textContent = bins.filter(b=>b.status==='Full').length;
    document.getElementById('avgLevel').textContent = Math.round(bins.reduce((a,b)=>a+b.level,0)/bins.length);
  </script>
</body>
</html>
