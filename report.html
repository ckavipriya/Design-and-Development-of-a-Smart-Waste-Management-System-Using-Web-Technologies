<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Smart Waste</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-8">
  <nav class="glass max-w-6xl mx-auto rounded-3xl p-6 mb-12 flex justify-between items-center">
    <h1 class="text-3xl font-bold text-white">
      <i class="fas fa-chart-bar mr-4 text-purple-400"></i>Analytics & Reports
    </h1>
    <div class="space-x-4">
      <button onclick="exportPDF()" class="btn btn-primary">
        <i class="fas fa-download mr-2"></i>Export PDF
      </button>
      <a href="admin.html" class="btn btn-secondary">Dashboard</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto grid grid-cols-1 xl:grid-cols-2 gap-12">
    <!-- Weekly Trends -->
    <div class="glass card">
      <h3 class="text-3xl font-bold text-white mb-8">Weekly Fill Trends</h3>
      <canvas id="trendChart" class="w-full h-96"></canvas>
    </div>

    <!-- Summary Stats -->
    <div class="glass card space-y-8">
      <h3 class="text-3xl font-bold text-white mb-8">Collection Summary</h3>
      <div class="grid grid-cols-2 gap-8 text-center">
        <div>
          <div class="text-5xl font-bold text-emerald-400 mb-4">245</div>
          <div class="text-2xl text-white/80">Tons Collected</div>
        </div>
        <div>
          <div class="text-5xl font-bold text-blue-400 mb-4">98%</div>
          <div class="text-2xl text-white/80">On-time Pickup</div>
        </div>
        <div>
          <div class="text-5xl font-bold text-purple-400 mb-4">12</div>
          <div class="text-2xl text-white/80">Active Routes</div>
        </div>
        <div>
          <div class="text-5xl font-bold text-orange-400 mb-4">3.2</div>
          <div class="text-2xl text-white/80">Avg Fill %</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Trends chart
    const ctx = document.getElementById('trendChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
          label: 'Avg Fill %',
          data: [45, 62, 78, 55, 82, 70, 65],
          borderColor: 'rgba(16, 185, 129, 1)',
          backgroundColor: 'rgba(16, 185, 129, 0.1)',
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } },
          x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } }
        },
        plugins: { legend: { labels: { color: 'white' } } }
      }
    });

    function exportPDF() {
      alert('📄 PDF Report generated!\n(In production: html2pdf.js or jsPDF)');
    }
  </script>
</body>
</html>
