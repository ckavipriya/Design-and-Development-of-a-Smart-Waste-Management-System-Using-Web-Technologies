<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>Smart Waste</h2>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<section class="ai-page">

<div class="ai-container">

<h2>Smart Waste AI Assistant</h2>

<div class="chat-box" id="chatBox">
<div class="ai-message">Hello! Ask me about waste management.</div>
</div>

<div class="chat-input">
<input type="text" id="question" placeholder="Ask question...">
<button onclick="askAI()">Send</button>
</div>

</div>

</section>

<script>

function askAI(){

let q=document.getElementById("question").value
let reply=""

if(q.toLowerCase().includes("bin")){
reply="Check the bin status page."
}

else if(q.toLowerCase().includes("collection")){
reply="Waste collection happens between 6AM and 10AM."
}

else{
reply="Thank you for your question."
}

let chat=document.getElementById("chatBox")

chat.innerHTML += "<div class='user-message'>"+q+"</div>"
chat.innerHTML += "<div class='ai-message'>"+reply+"</div>"

document.getElementById("question").value=""

}

</script>

</body>
</html>
