<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>Smart Waste</h2>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="ai-wrapper">

<div class="ai-card">

<h2>AI Waste Assistant</h2>
<p>Ask questions about waste management</p>

<div id="chatBox" class="chat-box">
<div class="ai-msg">Hello! Ask me about recycling, bins or waste collection.</div>
</div>

<div class="chat-input">
<input id="question" type="text" placeholder="Type your question">
<button onclick="askAI()">Send</button>
</div>

</div>

</div>

<script>

function askAI(){

let q=document.getElementById("question").value.toLowerCase()
let reply=""

if(q.includes("bin")){
reply="You can check bin status in the Status page."
}
else if(q.includes("collection")){
reply="Waste collection usually happens between 6AM and 10AM."
}
else if(q.includes("recycle")){
reply="Separate recyclable waste like plastic, paper and glass."
}
else{
reply="Our Smart Waste Management system helps monitor bins and improve recycling."
}

let chat=document.getElementById("chatBox")

chat.innerHTML += "<div class='user-msg'>"+q+"</div>"
chat.innerHTML += "<div class='ai-msg'>"+reply+"</div>"

document.getElementById("question").value=""

}

</script>

</body>
</html>
