<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>
<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-box{
background:white;
width:400px;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:90%;
padding:10px;
margin-top:15px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#2c7a7b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#answer{
margin-top:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="chat-box">

<h2>AI Waste Assistant</h2>

<p>Ask about waste management</p>

<input id="question" placeholder="Ask question...">

<br>

<button onclick="askAI()">Ask</button>

<div id="answer"></div>

</div>

<script>

function askAI(){

let q=document.getElementById("question").value.toLowerCase()

let reply=""

if(q.includes("bin")){
reply="Check the bin status page."
}

else if(q.includes("collection")){
reply="Waste collection is between 6AM and 10AM."
}

else if(q.includes("recycle")){
reply="Separate recyclable waste into recycling bins."
}

else{
reply="Thank you for your question."
}

document.getElementById("answer").innerText=reply

}

</script>

</body>
</html>
