<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Waste</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen p-6">
  <div class="glass max-w-md w-full p-12 rounded-3xl shadow-2xl">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-white mb-4">Welcome Back</h1>
      <p class="text-white/80">Sign in to your dashboard</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-6">
      <div>
        <input type="text" class="input" placeholder="Username (admin/user)" required>
      </div>
      <div>
        <input type="password" class="input" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary w-full text-lg py-5">Sign In</button>
    </form>

    <!-- Demo -->
    <div class="text-center mt-8 p-4 bg-white/10 rounded-2xl">
      <p class="text-white/90 text-sm mb-2">Demo Accounts:</p>
      <div class="text-emerald-300 font-mono text-sm">admin | user</div>
    </div>

    <div id="status" class="mt-6 text-center"></div>
  </div>

  <script>
    document.getElementById('loginForm').onsubmit = e => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.innerHTML = '<div class="status bg-emerald-500/30 text-emerald-200 p-4 rounded-xl">✅ Login successful! Redirecting...</div>';
      
      // Demo redirect after 1.5s
      setTimeout(() => {
        const isAdmin = document.querySelector('input[type="text"]').value === 'admin';
        window.location.href = isAdmin ? 'admin.html' : 'user.html';
      }, 1500);
    };
  </script>
</body>
</html>
