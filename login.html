<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Login - Smart Waste Management</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="login-bg">
  <div class="glass max-w-md mx-auto mt-24 p-12 rounded-3xl shadow-2xl">
    <div class="text-center mb-12">
      <div class="w-24 h-24 bg-gradient-to-r from-green-400 to-emerald-500 rounded-3xl mx-auto mb-6 flex items-center justify-center">
        <span class="text-3xl">🗑️</span>
      </div>
      <h1 class="text-4xl font-black bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent mb-2">SmartWaste</h1>
      <p class="text-gray-600 font-semibold">Coimbatore Municipal Dashboard</p>
    </div>
    
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
        <input id="username" type="text" placeholder="admin / user" class="input-field" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
        <input id="password" type="password" placeholder="•••••••" class="input-field" required>
      </div>
      <button type="submit" class="btn-primary w-full py-4 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl transition-all">Enter Dashboard</button>
      <div id="error" class="error-msg hidden"></div>
    </form>
    
    <div class="text-center mt-8 p-4 bg-gray-50 rounded-2xl">
      <p class="text-xs text-gray-500 mb-1">Demo Credentials:</p>
      <div class="text-sm font-mono">
        <span class="text-green-600">admin</span> / <span class="text-green-600">admin123</span><br>
        <span class="text-blue-600">user</span> / <span class="text-blue-600">user123</span>
      </div>
    </div>
  </div>

  <script>
    const users = { admin: 'admin123', user: 'user123' };
    document.getElementById('loginForm').onsubmit = e => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error');
      
      if (users[user] === pass) {
        localStorage.setItem('userRole', user);
        window.location.href = user === 'admin' ? 'dashboard.html' : 'user.html';
      } else {
        error.textContent = '❌ Invalid credentials';
        error.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
