<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWaste Pro - Secure Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <!-- CRITICAL: Load script.js FIRST -->
  <script src="script.js"></script>
  <style>
    /* Smooth animations */
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900/50 to-slate-900 min-h-screen flex items-center justify-center p-8 fade-in">
  
  <main class="w-full max-w-md">
    <!-- Glassmorphism Card -->
    <div class="bg-white/5 backdrop-blur-3xl rounded-3xl p-10 border border-white/10 shadow-2xl relative overflow-hidden">
      
      <!-- Decorative gradient -->
      <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 via-teal-400 to-emerald-500"></div>
      
      <!-- Header -->
      <div class="text-center mb-10">
        <div class="w-20 h-20 bg-gradient-to-r from-emerald-400 to-teal-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
          <i class="fas fa-shield-check text-2xl text-white font-bold"></i>
        </div>
        <h1 class="text-4xl font-black bg-gradient-to-r from-white to-gray-200 bg-clip-text mb-3">Secure Access</h1>
        <p class="text-white/70 text-xl">Enter credentials to access dashboard</p>
      </div>

      <!-- Form -->
      <div x-data="loginComponent()" class="space-y-6">
        
        <!-- Username Field -->
        <div>
          <label class="block text-white/80 font-semibold mb-3 flex items-center gap-3">
            <i class="fas fa-user text-emerald-400"></i>
            Username
          </label>
          <input 
            x-model="form.username"
            type="text" 
            placeholder="admin or user"
            @keydown.enter="login()"
            class="w-full h-14 px-5 pl-12 pr-5 bg-white/10 border-2 border-white/20 rounded-2xl 
                   text-white placeholder-white/50 text-lg font-medium backdrop-blur-sm
                   focus:border-emerald-400 focus:outline-none focus:ring-4 ring-emerald-400/30 
                   hover:border-white/30 transition-all duration-300"
          />
        </div>

        <!-- Password Field -->
        <div>
          <label class="block text-white/80 font-semibold mb-3 flex items-center gap-3">
            <i class="fas fa-lock text-emerald-400"></i>
            Password
          </label>
          <input 
            x-model="form.password"
            type="password" 
            placeholder="••••••••"
            @keydown.enter="login()"
            class="w-full h-14 px-5 pl-12 pr-5 bg-white/10 border-2 border-white/20 rounded-2xl 
                   text-white placeholder-white/50 text-lg font-medium backdrop-blur-sm
                   focus:border-emerald-400 focus:outline-none focus:ring-4 ring-emerald-400/30 
                   hover:border-white/30 transition-all duration-300"
          />
        </div>

        <!-- Error Message -->
        <div x-show="state.error" x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform translate-y-2"
             x-transition:enter-end="opacity-100 transform translate-y-0"
             class="p-4 bg-red-500/20 border-2 border-red-500/40 rounded-2xl text-red-100 font-medium text-center">
          <i class="fas fa-exclamation-triangle mr-2"></i>
          <span x-text="state.error"></span>
        </div>

        <!-- Login Button -->
        <button 
          @click="login()"
          :disabled="state.loading"
          class="w-full h-16 bg-gradient-to-r from-emerald-500 via-teal-500 to-emerald-600 
                 hover:from-emerald-600 hover:via-teal-600 hover:to-emerald-700
                 text-white text-xl font-black rounded-2xl shadow-2xl hover:shadow-3xl 
                 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 transform
                 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-3"
        >
          <span x-show="!state.loading">
            <i class="fas fa-rocket"></i>
            Launch Dashboard
          </span>
          <span x-show="state.loading">
            <i class="fas fa-spinner fa-spin"></i>
            Accessing...
          </span>
        </button>
      </div>

      <!-- Demo Credentials -->
      <div class="mt-12 pt-8 border-t border-white/20 text-center">
        <p class="text-emerald-300 font-bold text-lg mb-6">🔑 Quick Demo Login</p>
        <div class="grid grid-cols-2 gap-6 p-6 bg-white/5 backdrop-blur-sm rounded-2xl border border-emerald-500/20">
          <div class="text-center">
            <div class="text-white/80 font-medium mb-2">Admin</div>
            <code class="bg-gray-900/50 px-4 py-2 rounded-xl text-emerald-300 font-mono block">admin123</code>
          </div>
          <div class="text-center">
            <div class="text-white/80 font-medium mb-2">User</div>
            <code class="bg-gray-900/50 px-4 py-2 rounded-xl text-emerald-300 font-mono block">user123</code>
          </div>
        </div>
        <p class="text-white/50 mt-6 text-xs">Secure • JWT Auth • Kavipriya @ VSB College 2026</p>
      </div>
    </div>
  </main>

  <script>
    function loginComponent() {
      return {
        form: {
          username: '',
          password: ''
        },
        state: {
          loading: false,
          error: ''
        },
        
        async login() {
          // Basic validation
          if (!this.form.username.trim() || !this.form.password.trim()) {
            this.state.error = 'Please enter username AND password';
            return;
          }
          
          this.state.loading = true;
          this.state.error = '';
          
          try {
            // Use WasteManager login (from script.js)
            const response = await wm.login(this.form.username, this.form.password);
            
            if (response.success) {
              // Store auth data
              localStorage.setItem('authToken', response.token || btoa(this.form.username + ':' + Date.now()));
              localStorage.setItem('userRole', response.role);
              localStorage.setItem('username', this.form.username);
              
              // Success feedback
              if (window.showNotification) {
                window.showNotification('✅ Access Granted', `Welcome ${this.form.username}! Redirecting...`, 'success');
              }
              
              // PERFECT REDIRECT
              const dashboard = response.role === 'admin' ? 'admin.html' : 'user.html';
              setTimeout(() => {
                window.location.href = dashboard;
              }, 1200);
              
            } else {
              this.state.error = response.error || 'Login failed. Try demo credentials.';
            }
          } catch (error) {
            this.state.error = 'Connection error. Please refresh.';
            console.error('Login error:', error);
          } finally {
            this.state.loading = false;
          }
        }
      }
    }
  </script>
</body>
</html>
