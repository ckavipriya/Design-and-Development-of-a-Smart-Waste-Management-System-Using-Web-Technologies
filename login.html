<!DOCTYPE html>
<html lang="en">
<head><!-- Same CDNs as index --></head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center">
  <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-12 w-full max-w-md shadow-2xl">
    <h2 class="text-3xl font-bold text-white mb-8 text-center"><i class="fas fa-sign-in-alt mr-2"></i>Secure Login</h2>
    <div x-data="{ username: '', password: '', error: '', loading: false }">
      <input x-model="username" type="text" placeholder="Username (admin/user)" class="w-full p-4 mb-4 bg-white/30 border border-white/50 rounded-xl text-white placeholder-white/70 focus:outline-none focus:ring-4 ring-white/30">
      <input x-model="password" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-white/30 border border-white/50 rounded-xl text-white placeholder-white/70 focus:outline-none focus:ring-4 ring-white/30">
      <button @click="loading=true; wm.login(username, password).then(r => { loading=false; if(r.success) { localStorage.setItem('role', r.role); window.location.href = r.role+'.html'; } else error=r.error; })" :disabled="loading" class="w-full bg-white text-indigo-600 p-4 rounded-xl font-bold hover:shadow-xl transition-all disabled:opacity-50">
        <span x-show="!loading">Login</span>
        <i x-show="loading" class="fas fa-spinner fa-spin"></i>
      </button>
      <p x-show="error" class="text-red-200 mt-4 text-center">{{ error }}</p>
    </div>
    <p class="text-white/80 mt-8 text-center">Demo: admin/admin123 | user/user123</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
