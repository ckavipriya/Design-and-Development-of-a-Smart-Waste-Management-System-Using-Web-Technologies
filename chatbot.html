<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot - Smart Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="chatbot.css">
</head>
<body class="bg-gray-100 min-h-screen pt-20">
  <nav class="bg-white shadow fixed w-full z-50 py-4">
    <div class="container flex justify-between">
      <h2 class="text-2xl font-bold text-indigo-600">SmartWaste AI Assistant</h2>
      <a href="user.html" class="btn bg-indigo-600">Dashboard</a>
    </div>
  </nav>
  <div class="container max-w-2xl mx-auto mt-24">
    <div class="chat-container bg-white rounded-2xl shadow-2xl h-[600px] flex flex-col">
      <div id="chatbox" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
      <div class="p-6 border-t">
        <div class="flex">
          <textarea id="msgInput" placeholder="Ask about bins, routes, waste types..." class="flex-1 p-4 border rounded-l-lg resize-none focus:outline-none" rows="1"></textarea>
          <button onclick="sendMsg()" class="bg-indigo-600 text-white p-4 rounded-r-lg hover:bg-indigo-700">Send</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const responses = {
      'bin': 'Bins alert at 85% fill. Nearest full bin: ID#3 at 92%.',
      'route': 'Optimized route: Bin1 → Bin5 → Bin2. Saves 30% fuel.',
      'waste': 'Wet: kitchen waste. Dry: paper/plastic. Segregate for efficiency!',
      'full': 'Alert sent to driver. ETA: 2hrs.',
      default: 'Smart tip: Segregate waste! Need help with bins/routes?'
    };
    function sendMsg() {
      const input = document.getElementById('msgInput');
      const msg = input.value.trim();
      if (!msg) return;
      const chatbox = document.getElementById('chatbox');
      chatbox.innerHTML += `<div class="chat outgoing"><p>${msg}</p></div>`;
      input.value = '';
      chatbox.scrollTop = chatbox.scrollHeight;
      // Simulate AI reply
      setTimeout(() => {
        const key = Object.keys(responses).find(k => msg.toLowerCase().includes(k)) || 'default';
        const reply = responses[key];
        chatbox.innerHTML += `<div class="chat incoming"><p>${reply}</p></div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
      }, 1000);
    }
    document.getElementById('msgInput').onkeypress = e => e.key === 'Enter' && sendMsg();
  </script>
</body>
</html>
