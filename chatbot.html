<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Waste AI Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    #chatbot-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    .chatbot-toggle { width: 60px; height: 60px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; box-shadow: 0 10px 30px rgba(16,185,129,0.4); transition: all 0.3s; }
    .chatbot-toggle:hover { transform: scale(1.1); box-shadow: 0 15px 40px rgba(16,185,129,0.6); }
    .chatbot-panel { background: white; width: 350px; height: 500px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); transform: translateY(100%); transition: transform 0.3s; }
    .chatbot-panel.open { transform: translateY(0); }
    .chat-messages { height: 380px; overflow-y: auto; padding: 20px; background: #f8fafc; }
    .message { margin-bottom: 15px; }
    .user { text-align: right; }
    .bot { text-align: left; }
    .chat-input { display: flex; padding: 20px; background: white; border-top: 1px solid #e2e8f0; }
    .chat-input input { flex: 1; border: 1px solid #d1d5db; border-radius: 25px; padding: 12px 20px; outline: none; }
    .chat-send { width: 50px; height: 50px; background: #10b981; border: none; border-radius: 50%; margin-left: 10px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="chatbot-container">
    <button id="chatbot-toggle" class="chatbot-toggle">
      <i class="fas fa-robot text-white text-xl"></i>
    </button>
    <div id="chatbot-panel" class="chatbot-panel">
      <div class="bg-gradient-to-r from-green-500 to-emerald-600 p-4 flex justify-between items-center text-white">
        <div><i class="fas fa-robot mr-2"></i><strong>WasteBot AI</strong></div>
        <button id="chatbot-close" class="text-white hover:text-gray-200"><i class="fas fa-times"></i></button>
      </div>
      <div id="chat-messages" class="chat-messages">
        <div class="message bot">
          <div class="bg-green-100 p-3 rounded-2xl inline-block max-w-xs">
            Hi! I'm WasteBot. Ask about bin status, schedules, recycling tips! 🤖
          </div>
        </div>
      </div>
      <div class="chat-input">
        <input id="chat-input" type="text" placeholder="Type message... (Enter to send)" />
        <button id="chat-send" class="chat-send"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <script>
    const responses = {
      'hi': 'Hello! Welcome to Smart Waste Management. How can I help? 🗑️',
      'status': 'Bins: B001 (75% full), B002 (20% empty). Check dashboard for live updates! 📊',
      'schedule': 'Collections: Mon/Wed/Fri 6AM. Full bins prioritized. 🚚',
      'recycle': 'Plastic, paper, metal in blue bins. Organic in green. No mixing! ♻️',
      'help': 'Commands: status, schedule, recycle, routes. Or ask naturally! ❓',
      'routes': 'Optimized GPS routes for collectors. Admin view only. 🗺️',
      'default': 'Sorry, ask about status, schedule, recycle, or routes! 🤖'
    };

    const chatbotToggle = document.getElementById('chatbot-toggle');
    const chatbotPanel = document.getElementById('chatbot-panel');
    const chatbotClose = document.getElementById('chatbot-close');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');
    const chatMessages = document.getElementById('chat-messages');

    chatbotToggle.onclick = () => chatbotPanel.classList.toggle('open');
    chatbotClose.onclick = () => chatbotPanel.classList.remove('open');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      msg.innerHTML = `<div class="p-3 rounded-2xl inline-block max-w-xs bg-${isUser ? 'indigo-500 text-white' : 'green-100'}">${text}</div>`;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const msg = chatInput.value.trim();
      if (!msg) return;
      addMessage(msg, true);
      chatInput.value = '';

      // Typing animation
      addMessage('Typing...', false);
      setTimeout(() => {
        chatMessages.removeChild(chatMessages.lastChild); // Remove typing
        const reply = responses[msg.toLowerCase()] || responses['default'];
        addMessage(reply, false);
      }, 1000);
    }

    chatSend.onclick = sendMessage;
    chatInput.onkeypress = e => e.key === 'Enter' && sendMessage();
  </script>
</body>
</html>
