<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-8">
  <h1 class="text-4xl font-bold mb-8">Admin Dashboard</h1>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <canvas id="fillChart" width="400" height="200"></canvas>
    <div id="binsList" class="bg-white p-6 rounded-lg shadow"></div>
  </div>
  <script>
    async function loadData() {
      const res = await fetch('http://localhost:3000/api/bins');
      const bins = await res.json();
      document.getElementById('binsList').innerHTML = bins.map(b => 
        `<div class="p-4 border-b">Bin ${b.id}: ${b.fill}% ${b.status}</div>`).join('');
      
      const ctx = document.getElementById('fillChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: { labels: bins.map(b=>`Bin ${b.id}`), datasets: [{label:'Fill %', data:bins.map(b=>b.fill), backgroundColor:'rgba(34,197,94,0.5)'}] }
      });
    }
    loadData(); setInterval(loadData, 5000);
  </script>
</body>
</html>
