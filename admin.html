<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Smart Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="bg-white/80 backdrop-blur-md shadow-lg fixed w-full z-50 py-4">
    <div class="container flex justify-between">
      <h2 class="text-2xl font-bold text-indigo-600">SmartWaste | Admin</h2>
      <div>
        <span id="adminEmail" class="mr-4"></span>
        <a href="report.html" class="btn bg-blue-600 mr-2">Reports</a>
        <button onclick="logout()" class="btn bg-red-500">Logout</button>
      </div>
    </div>
  </nav>
  <div class="pt-20">
    <div class="container grid lg:grid-cols-2 gap-8">
      <div class="card">
        <h2 class="text-2xl font-bold mb-6">Bin Status</h2>
        <div id="binsDashboard" class="space-y-4"></div>
      </div>
      <div class="card">
        <h2 class="text-2xl font-bold mb-6">Pending Requests</h2>
        <div id="pendingRequests" class="space-y-4"></div>
      </div>
      <div class="card lg:col-span-2">
        <h2 class="text-2xl font-bold mb-6">Analytics</h2>
        <canvas id="analyticsChart" height="300"></canvas>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    // Admin-specific chart
    new Chart(document.getElementById('analyticsChart'), {
      type: 'doughnut',
      data: { labels: ['Full Bins', 'OK', 'Empty'], datasets: [{ data: [12, 25, 8], backgroundColor: ['#ef4444', '#10b981', '#3b82f6'] }] },
      options: { responsive: true }
    });
  </script>
</body>
</html>
