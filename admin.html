<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Admin Panel</h1>
    <a href="index.html">Logout</a>
  </header>
  <div class="container">
    <div class="card">
      <h2>Manage Bins</h2>
      <table>
        <thead><tr><th>ID</th><th>Location</th><th>Level</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="statusTable"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>Add Bin</h2>
      <input id="loc" placeholder="Location"><button class="btn" onclick="bins.push({id:bins.length+1,location:document.getElementById('loc').value,level:0,status:'Empty'});updateStatus();">Add</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
