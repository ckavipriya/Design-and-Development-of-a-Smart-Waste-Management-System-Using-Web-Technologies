<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - SmartWaste Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* Quick Fix CSS - Copy to style.css if missing */
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; box-shadow: 0 25px 45px rgba(0,0,0,0.1); }
    .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px 28px; border-radius: 50px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .progress { height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #00d4ff, #7c3aed); }
    #particles-js { position: fixed; z-index: -1; }
  </style>
</head>
<body data-theme="light">
  
  <!-- Particles Background -->
  <div id="particles-js" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></div>
  
  <!-- Navbar -->
  <nav class="glass fixed w-full z-50 py-6 px-8 backdrop-blur-xl shadow-2xl" style="backdrop-filter: blur(20px);">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-xl">
          <span class="text-2xl">🚛</span>
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">SmartWaste Pro</h1>
      </div>
      <div class="flex items-center space-x-4">
        <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white/20 hover:bg-white/40 transition-all" title="Dark Mode">🌙</button>
        <span class="text-lg font-semibold bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">Admin: admin@smartwaste.com</span>
        <button onclick="logout()" class="btn text-sm px-6 py-3 ml-4">Logout</button>
      </div>
    </div>
  </nav>

  <div class="pt-32 pb-12">
    <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-8">
      
      <!-- KPIs -->
      <div class="glass p-8">
        <h2 class="text-2xl font-bold mb-8 bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">📊 Real-Time KPIs</h2>
        <div class="grid grid-cols-2 gap-6">
          <div class="text-center p-8 rounded-2xl bg-white/20 hover:bg-white/30 transition-all">
            <div class="text-4xl font-black mb-2 text-red-400">🚨 18</div>
            <div class="text-xl opacity-90">Critical Bins</div>
          </div>
          <div class="text-center p-8 rounded-2xl bg-white/20 hover:bg-white/30 transition-all">
            <div class="text-4xl font-black mb-2 text-emerald-400">✅ 247</div>
            <div class="text-xl opacity-90">Active Bins</div>
          </div>
          <div class="text-center p-8 rounded-2xl bg-white/20 hover:bg-white/30 transition-all">
            <div class="text-4xl font-black mb-2 text-blue-400">📈 47%</div>
            <div class="text-xl opacity-90">Efficiency</div>
          </div>
          <div class="text-center p-8 rounded-2xl bg-white/20 hover:bg-white/30 transition-all">
            <div class="text-4xl font-black mb-2 text-purple-400">⚡ 3.2h</div>
            <div class="text-xl opacity-90">Response Time</div>
          </div>
        </div>
      </div>

      <!-- LIVE MAP (Works Instantly!) -->
      <div class="glass p-8">
        <h2 class="text-2xl font-bold mb-6 bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
          🗺️ Live Fleet Tracking <span class="ml-2 px-3 py-1 bg-red-500/30 text-red-400 text-sm rounded-full font-bold animate-pulse">● LIVE</span>
        </h2>
        <div id="map" style="height: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3);"></div>
        <div class="mt-6 flex flex-wrap gap-4 text-sm opacity-80">
          <span class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full">🟢 Driver Raju - Area A</span>
          <span class="px-3 py-1 bg-yellow-500/20 text-yellow-400 rounded-full">🟡 Driver Priya - En Route</span>
          <span class="px-3 py-1 bg-red-500/20 text-red-400 rounded-full">🚨 Bin #3 Critical</span>
        </div>
      </div>

      <!-- Bin Status -->
      <div class="lg:col-span-2 glass p-8">
        <div class="flex justify-between items-center mb-10">
          <h2 class="text-3xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">🛠️ Smart Bin Control</h2>
          <div class="flex gap-3">
            <button class="px-6 py-3 bg-emerald-500/20 text-emerald-400 rounded-2xl backdrop-blur hover:bg-emerald-500/40 transition-all font-semibold">🧠 AI Optimize</button>
            <button class="px-6 py-3 bg-blue-500/20 text-blue-400 rounded-2xl backdrop-blur hover:bg-blue-500/40 transition-all font-semibold">🔄 Refresh All</button>
          </div>
        </div>
        <div id="binsDashboard" class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
      </div>

      <!-- Analytics Chart -->
      <div class="lg:col-span-2 glass p-12">
        <h2 class="text-3xl font-bold mb-10 bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">📈 Intelligence Dashboard</h2>
        <canvas id="analyticsChart" height="350"></canvas>
      </div>
    </div>
  </div>

  <!-- SCRIPTS - EVERYTHING WORKS INSTANTLY -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    // 1. Particles (Beautiful BG)
    particlesJS('particles-js', {
      particles: { number: { value: 60 }, color: { value: ['#00d4ff','#7c3aed','#00ff88'] }, size: { value: 4 }, move: { speed: 1 } },
      interactivity: { events: { onhover: { enable: true, mode: 'repulse' } } }
    });

    // 2. LIVE MAP (Madurai + Moving Drivers)
    let map = L.map('map').setView([10.9074, 78.0973], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);
    
    // Moving Driver Markers
    const driver1 = L.marker([10.9074, 78.0973]).addTo(map).bindPopup('🟢 Driver Raju<br>Bin Area A');
    const driver2 = L.marker([10.9120, 78.1020]).addTo(map).bindPopup('🟡 Driver Priya<br>ETA 14min');
    
    // Animate drivers
    setInterval(() => {
      driver1.setLatLng([10.9074 + (Math.random()-0.5)*0.003, 78.0973 + (Math.random()-0.5)*0.003]);
      driver2.setLatLng([10.9120 + (Math.random()-0.5)*0.004, 78.1020 + (Math.random()-0.5)*0.004]);
    }, 2000);

    // Critical Bin
    L.circleMarker([10.9050, 78.0950], {radius: 18, color: '#ef4444', fillOpacity: 0.8}).addTo(map)
      .bindPopup('🚨 Bin #3<br>92% Full - Urgent!');

    // 3. GSAP Animations
    gsap.from('.glass', {y: 80, opacity: 0, duration: 1, stagger: 0.2, ease: 'power3.out'});
    gsap.to('.btn', {y: -5, duration: 2, yoyo: true, repeat: -1, stagger: 0.3});

    // 4. Theme Toggle
    function toggleTheme() {
      document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
    }

    // 5. Live Bins (Auto Updates)
    const bins = [
      {id:1,fill:75,status:'Full',type:'Wet',loc:'Area A'},
      {id:2,fill:40,status:'OK',type:'Dry',loc:'Area B'},
      {id:3,fill:92,status:'Critical',type:'Plastic',loc:'Area C'},
      {id:4,fill:15,status:'Empty',type:'Organic',loc:'Area D'}
    ];
    
    function renderBins() {
      document.getElementById('binsDashboard').innerHTML = bins.map(bin => `
        <div class="glass p-8 text-center hover:scale-105 transition-all duration-500 group cursor-pointer border-4 border-transparent hover:border-indigo-400/50 rounded-2xl">
          <div class="w-24 h-24 mx-auto mb-6 rounded-3xl flex items-center justify-center text-4xl shadow-2xl group-hover:rotate-12 transition-all ${
            bin.status=='Critical' ? 'bg-gradient-to-r from-red-500 to-orange-500' :
            bin.status=='Full' ? 'bg-gradient-to-r from-amber-500 to-yellow-500' :
            'bg-gradient-to-r from-emerald-500 to-teal-500'
          }">
            ${bin.status=='Critical'?'🚨':bin.status=='Full'?'⚠️':'✅'}
          </div>
          <h3 class="text-2xl font-bold mb-4 text-white drop-shadow-lg">${bin.status}</h3>
          <div class="progress mb-6 mx-auto max-w-lg"><div class="progress-bar" style="width:${bin.fill}%"></div></div>
          <div class="text-white space-y-1 text-lg">
            <div>ID: <span class="font-black text-2xl">#${bin.id}</span></div>
            <div>${bin.type} • ${bin.loc}</div>
            <div class="font-mono text-xl">${bin.fill}%</div>
          </div>
        </div>
      `).join('');
    }
    renderBins();
    
    // Animate bins fill levels
    setInterval(() => {
      bins.forEach((bin,i) => {
        bin.fill += (Math.random()-0.5)*8;
        bin.fill = Math.max(0,Math.min(100,bin.fill));
        bin.status = bin.fill>85?'Critical':bin.fill>60?'Full':'OK';
      });
      renderBins();
    }, 4000);

    // 6. Analytics Chart
    new Chart(document.getElementById('analyticsChart'), {
      type: 'line',
      data: {
        labels: ['6AM','9AM','12PM','3PM','6PM','9PM'],
        datasets: [{
          label: 'Waste Collected (tons)',
          data: [28,52,135,108,92,67],
          borderColor: '#00d4ff',
          backgroundColor: 'rgba(0,212,255,0.15)',
          tension: 0.4, fill: true, borderWidth: 4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: 'white', font: { size: 16 } } } },
        scales: {
          y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } },
          x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } }
        }
      }
    });

    function logout() { localStorage.clear(); location.reload(); }
  </script>
</body>
</html>
