<!DOCTYPE html>
<html>
<head>
  <title>Admin - Smart Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-gradient-to-br from-emerald-500 to-teal-600 min-h-screen p-8">
  <!-- Header -->
  <nav class="bg-white/20 backdrop-blur-xl rounded-3xl p-6 mb-8 shadow-2xl">
    <div class="flex justify-between items-center">
      <h1 class="text-4xl font-bold text-white drop-shadow-lg">Admin Dashboard</h1>
      <a href="index.html" class="bg-white text-emerald-600 px-8 py-3 rounded-2xl font-bold hover:shadow-xl">Logout</a>
    </div>
  </nav>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white/30 backdrop-blur-xl rounded-3xl p-8 text-center shadow-2xl">
      <div class="text-4xl font-bold text-white mb-2" id="totalBins">50</div>
      <div class="text-white/80 text-lg">Total Bins</div>
    </div>
    <div class="bg-white/30 backdrop-blur-xl rounded-3xl p-8 text-center shadow-2xl">
      <div class="text-4xl font-bold text-red-400 mb-2" id="fullBins">8</div>
      <div class="text-white/80 text-lg">Full Bins</div>
    </div>
    <div class="bg-white/30 backdrop-blur-xl rounded-3xl p-8 text-center shadow-2xl">
      <div class="text-4xl font-bold text-yellow-400 mb-2" id="pendingComplaints">3</div>
      <div class="text-white/80 text-lg">Pending Complaints</div>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 shadow-2xl">
      <h3 class="text-2xl font-bold text-white mb-6">Fill Levels</h3>
      <canvas id="fillChart" height="200"></canvas>
    </div>
    <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 shadow-2xl">
      <h3 class="text-2xl font-bold text-white mb-6">Status Distribution</h3>
      <canvas id="statusChart" height="200"></canvas>
    </div>
  </div>

  <!-- Complaints Table -->
  <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 shadow-2xl">
    <h3 class="text-2xl font-bold text-white mb-6">Recent Complaints</h3>
    <div id="complaintsTable" class="overflow-x-auto">
      <!-- Loaded by JS -->
    </div>
  </div>

  <script>
    // Load data
    async function loadDashboard() {
      const bins = await loadBins();
      
      // Update stats
      document.getElementById('totalBins').textContent = bins.length;
      document.getElementById('fullBins').textContent = bins.filter(b => b.status === 'Full').length;
      
      // Fill chart
      const ctx1 = document.getElementById('fillChart').getContext('2d');
      new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: bins.map(b => b.id),
          datasets: [{ label: 'Fill %', data: bins.map(b => b.fill), backgroundColor: 'rgba(255,255,255,0.8)' }]
        },
        options: { scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { labels: { color: 'white' } } } }
      });

      // Status pie
      const statusData = {};
      bins.forEach(b => statusData[b.status] = (statusData[b.status] || 0) + 1);
      const ctx2 = document.getElementById('statusChart').getContext('2d');
      new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: Object.keys(statusData),
          datasets: [{ data: Object.values(statusData), backgroundColor: ['#ef4444', '#f59e0b', '#10b981'] }]
        },
        options: { plugins: { legend: { labels: { color: 'white' } } } }
      });

      // Complaints (mock)
      document.getElementById('complaintsTable').innerHTML = `
        <table class="w-full text-left text-white">
          <thead><tr class="border-b border-white/30"><th class="p-4">ID</th><th>User</th><th>Bin</th><th>Issue</th><th>Action</th></tr></thead>
          <tbody>
            <tr><td class="p-4">C001</td><td>Kavipriya</td><td>B001</td><td>Overflowing</td><td><button class="bg-green-500 text-white px-4 py-2 rounded-lg">Resolve</button></td></tr>
          </tbody>
        </table>
      `;
    }

    loadDashboard();
  </script>
</body>
</html>
