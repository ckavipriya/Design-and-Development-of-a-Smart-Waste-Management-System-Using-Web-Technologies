<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Smart Waste</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-8">
  <!-- Navbar -->
  <nav class="glass max-w-6xl mx-auto rounded-3xl p-6 mb-12 flex justify-between items-center">
    <h1 class="text-4xl font-bold text-white drop-shadow-lg">
      <i class="fas fa-users-cog mr-4 text-emerald-400"></i>Admin Panel
    </h1>
    <div class="space-x-4">
      <a href="status.html" class="btn btn-secondary">Live Status</a>
      <a href="index.html" class="btn btn-primary">Logout</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">
    <!-- Stats Cards -->
    <div class="glass card col-span-1">
      <div class="text-center">
        <div class="text-5xl font-bold text-white mb-4" id="totalBins">3</div>
        <div class="text-2xl text-white/80">Total Bins</div>
      </div>
    </div>
    <div class="glass card col-span-1">
      <div class="text-center">
        <div class="text-5xl font-bold text-red-400 mb-4" id="fullBins">1</div>
        <div class="text-2xl text-white/80">Full Bins</div>
      </div>
    </div>
    <div class="glass card col-span-1">
      <div class="text-center">
        <div class="text-5xl font-bold text-orange-400 mb-4" id="criticalBins">1</div>
        <div class="text-2xl text-white/80">Critical</div>
      </div>
    </div>

    <!-- Fill Levels Chart -->
    <div class="glass card col-span-1 lg:col-span-2 xl:col-span-3">
      <h3 class="text-3xl font-bold text-white mb-8 text-center">Bin Fill Levels</h3>
      <canvas id="fillChart" class="w-full h-80"></canvas>
    </div>

    <!-- Recent Complaints -->
    <div class="glass card col-span-1 lg:col-span-2 xl:col-span-3">
      <h3 class="text-3xl font-bold text-white mb-8 flex items-center">
        <i class="fas fa-exclamation-triangle mr-4 text-orange-400"></i>
        Recent Complaints
      </h3>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b border-white/30">
              <th class="p-6 font-bold text-white">ID</th>
              <th class="p-6 font-bold text-white">User</th>
              <th class="p-6 font-bold text-white">Bin</th>
              <th class="p-6 font-bold text-white">Issue</th>
              <th class="p-6 font-bold text-white">Status</th>
              <th class="p-6 font-bold text-white">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b border-white/10 hover:bg-white/10">
              <td class="p-6 font-mono text-emerald-300">#C001</td>
              <td class="p-6 text-white/90">Kavipriya</td>
              <td class="p-6"><span class="bg-blue-500/30 text-blue-200 px-3 py-1 rounded-full">B001</span></td>
              <td class="p-6 text-white/90">Overflowing plastic</td>
              <td><span class="status status-full px-4 py-2 rounded-xl">Pending</span></td>
              <td class="p-6">
                <button class="btn btn-primary px-6 py-3 text-sm">
                  <i class="fas fa-check mr-2"></i>Resolve
                </button>
              </td>
            </tr>
            <tr class="border-b border-white/10 hover:bg-white/10">
              <td class="p-6 font-mono text-emerald-300">#C002</td>
              <td class="p-6 text-white/90">Ramesh</td>
              <td class="p-6"><span class="bg-orange-500/30 text-orange-200 px-3 py-1 rounded-full">B003</span></td>
              <td class="p-6 text-white/90">Unclean bin</td>
              <td><span class="status status-empty px-4 py-2 rounded-xl bg-green-500/30 text-green-200">Resolved</span></td>
              <td class="p-6">
                <button class="btn btn-secondary px-6 py-3 text-sm">
                  <i class="fas fa-eye mr-2"></i>View
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Charts
    const ctx = document.getElementById('fillChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['B001', 'B002', 'B003'],
        datasets: [{
          label: 'Fill Level %',
          data: [75, 20, 90],
          backgroundColor: 'rgba(255, 255, 255, 0.8)',
          borderColor: 'rgba(16, 185, 129, 1)',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } },
          x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } }
        },
        plugins: { legend: { labels: { color: 'white', font: { size: 16 } } } }
      }
    });

    // Update stats
    document.getElementById('totalBins').textContent = 3;
    document.getElementById('fullBins').textContent = 1;
    document.getElementById('criticalBins').textContent = 1;
  </script>
</body>
</html>
