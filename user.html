<!DOCTYPE html>
<html>
<head>
  <title>User - Smart Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js" defer></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-600 min-h-screen p-8">
  <nav class="bg-white/20 backdrop-blur-xl rounded-3xl p-6 mb-8 shadow-2xl">
    <div class="flex justify-between">
      <h1 class="text-3xl font-bold text-white">User Dashboard</h1>
      <a href="index.html" class="bg-white text-blue-600 px-6 py-3 rounded-xl font-bold">Logout</a>
    </div>
  </nav>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Nearby Bins -->
    <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 shadow-2xl">
      <h3 class="text-2xl font-bold text-white mb-6">Nearby Bins</h3>
      <div id="binsList" class="space-y-4">
        <!-- Loaded by JS -->
      </div>
    </div>

    <!-- Complaint Form -->
    <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 shadow-2xl">
      <h3 class="text-2xl font-bold text-white mb-6">Report Issue</h3>
      <form id="complaintForm" class="space-y-4">
        <select class="w-full p-4 bg-white/50 rounded-xl text-lg" required>
          <option value="">Select Bin</option>
          <option value="B001">B001 - College Gate</option>
          <option value="B002">B002 - Market Road</option>
          <option value="B003">B003 - Hostel</option>
        </select>
        <textarea class="w-full p-4 bg-white/50 rounded-xl h-32 resize-none" placeholder="Describe problem (overflow, unclean, etc.)" required></textarea>
        <button type="submit" class="w-full bg-emerald-500 text-white py-4 px-8 rounded-xl font-bold text-lg shadow-xl hover:shadow-2xl transition-all">
          Submit Complaint
        </button>
      </form>
      <div id="complaintStatus" class="mt-4"></div>
    </div>
  </div>

  <script>
    async function loadUserPage() {
      const bins = await loadBins();
      const list = document.getElementById('binsList');
      list.innerHTML = bins.map(bin => `
        <div class="p-6 bg-white/30 rounded-2xl backdrop-blur-xl shadow-xl flex justify-between items-center">
          <div>
            <div class="text-xl font-bold text-white">${bin.id}</div>
            <div class="text-white/80">${bin.location}</div>
          </div>
          <div class="text-right">
            <div class="text-2xl font-bold text-white">${bin.fill}%</div>
            <div class="px-4 py-2 rounded-full bg-white/30 text-white font-bold ${bin.status === 'Full' ? 'bg-red-500/30' : 'bg-green-500/30'}">
              ${bin.status}
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('complaintForm').onsubmit = async e => {
      e.preventDefault();
      const formData = Object.fromEntries(new FormData(e.target));
      const statusEl = document.getElementById('complaintStatus');
      
      statusEl.innerHTML = '<div class="bg-green-500/20 text-green-100 p-4 rounded-xl">Submitting...</div>';
      
      try {
        const complaint = await submitComplaint(formData);
        statusEl.innerHTML = `<div class="bg-green-500/20 text-green-100 p-4 rounded-xl">✅ Complaint #${complaint.id} submitted!</div>`;
        e.target.reset();
      } catch (err) {
        statusEl.innerHTML = '<div class="bg-red-500/20 text-red-100 p-4 rounded-xl">❌ Error submitting</div>';
      }
    };

    loadUserPage();
  </script>
</body>
</html>
