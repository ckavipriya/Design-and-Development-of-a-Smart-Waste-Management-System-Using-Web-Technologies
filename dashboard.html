<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Smart Waste Coimbatore</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="dashboard-bg">
  <!-- Top Nav -->
  <nav class="glass sticky top-0 z-50 p-6 shadow-2xl">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <div class="w-12 h-12 bg-gradient-to-r from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center">
          <span class="text-2xl">🗑️</span>
        </div>
        <div>
          <h1 class="text-2xl font-black bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text">SmartWaste Dashboard</h1>
          <p class="text-sm text-gray-500">Coimbatore Division</p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <span class="px-4 py-2 bg-green-100 text-green-800 rounded-full text-sm font-semibold">Live</span>
        <button onclick="exportReport()" class="btn-secondary px-6 py-2 rounded-xl font-semibold">📊 Export Report</button>
        <a href="login.html" class="btn-danger px-6 py-2 rounded-xl font-semibold" onclick="localStorage.removeItem('userRole')">Logout</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-8 space-y-12">
    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition-all">
        <div class="text-4xl font-black text-emerald-600 mb-2">248</div>
        <div class="text-2xl font-bold text-gray-800">Total Bins</div>
      </div>
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition-all">
        <div class="text-4xl font-black text-red-500 mb-2">34</div>
        <div class="text-2xl font-bold text-gray-800">Critical Alerts</div>
      </div>
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition-all">
        <div class="text-4xl font-black text-blue-600 mb-2">92.4%</div>
        <div class="text-2xl font-bold text-gray-800">Efficiency</div>
      </div>
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition-all">
        <div class="text-4xl font-black text-purple-600 mb-2">₹1.2L</div>
        <div class="text-2xl font-bold text-gray-800">Monthly Savings</div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="glass p-8 rounded-3xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 flex items-center">
          📊 Bin Fill Levels <span class="ml-4 px-4 py-1 bg-emerald-100 text-emerald-800 rounded-full text-sm font-semibold">Live Data</span>
        </h2>
        <canvas id="fillChart" height="300"></canvas>
      </div>
      <div class="glass p-8 rounded-3xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-8">Status Distribution</h2>
        <canvas id="statusChart" height="300"></canvas>
      </div>
    </div>

    <!-- Map & Alerts -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
      <div class="glass p-8 rounded-3xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-8">🗺️ Coimbatore Bin Map</h2>
        <div id="map" style="height: 400px; border-radius: 24px;"></div>
      </div>
      <div class="glass p-8 rounded-3xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-8">🚨 Active Alerts</h2>
        <div id="alertsList" class="space-y-4 max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </main>

  <script>
    // Auth check
    if (localStorage.getItem('userRole') !== 'admin') location.href = 'login.html';

    // Live data simulation
    const locations = [
      {name: 'RS Puram', lat: 11.0168, lng: 76.9558, fill: 85},
      {name: 'Gandhipuram', lat: 11.0250, lng: 76.9680, fill: 92},
      {name: 'RS Puram', lat: 11.0200, lng: 76.9600, fill: 45},
      {name: 'Town Hall', lat: 11.0175, lng: 76.9575, fill: 78}
    ];

    let bins = [];
    let fillChart, statusChart, map;

    function updateLiveData() {
      bins = locations.map(loc => ({
        ...loc,
        fill: Math.max(0, Math.floor(loc.fill + (Math.random() - 0.5) * 20))
      })).concat(Array(20).fill().map((_, i) => ({
        name: `Bin-${i+5}`, lat: 11.01 + Math.random()*0.02, lng: 76.95 + Math.random()*0.02, fill: Math.floor(Math.random()*101)
      })));

      updateAlerts();
      updateCharts();
      updateMap();
    }

    function updateAlerts() {
      const alerts = bins.filter(b => b.fill > 80).slice(0, 8);
      document.getElementById('alertsList').innerHTML = alerts.length ? 
        alerts.map(b => `
          <div class="alert-card p-6 bg-gradient-to-r from-red-50 to-orange-50 border-l-4 border-red-400 rounded-2xl hover:shadow-xl transition-all">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-black text-2xl text-red-600">${b.name}</div>
                <div class="text-3xl font-bold text-gray-800">${b.fill}%</div>
                <div class="text-sm text-gray-600">${b.lat.toFixed(4)}, ${b.lng.toFixed(4)}</div>
              </div>
              <button onclick="resolveAlert('${b.name}')" class="ml-4 px-4 py-2 bg-emerald-500 text-white rounded-xl font-semibold hover:bg-emerald-600 transition">Resolve</button>
            </div>
          </div>
        `).join('') : '<div class="text-center py-12 text-gray-500"><span class="text-6xl mb-4">✅</span><p class="text-xl font-semibold">No Active Alerts</p></div>';
    }

    function updateCharts() {
      const fills = bins.slice(0,10).map(b => b.fill);
      const statusCount = bins.reduce((acc, b) => {
        const status = b.fill > 80 ? 'Critical' : b.fill > 50 ? 'Warning' : 'Normal';
        acc[status] = (acc[status] || 0) + 1;
        return acc;
      }, {});

      if (fillChart) {
        fillChart.data.labels = bins.slice(0,10).map(b => b.name.slice(0,8));
        fillChart.data.datasets[0].data = fills;
        fillChart.update('active');
      }

      if (statusChart) {
        statusChart.data.labels = Object.keys(statusCount);
        statusChart.data.datasets[0].data = Object.values(statusCount);
        statusChart.update('active');
      }
    }

    function updateMap() {
      if (!map) {
        map = L.map('map').setView([11.0168, 76.9558], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      }
      
      // Clear old markers
      map.eachLayer(layer => { if (layer instanceof L.Marker) map.removeLayer(layer); });
      
      bins.slice(0,20).forEach(b => {
        const color = b.fill > 80 ? 'red' : b.fill > 50 ? 'orange' : 'green';
        L.circleMarker([b.lat, b.lng], {
          radius: Math.max(8, b.fill/8),
          fillColor: color,
          color: '#fff',
          weight: 3,
          opacity: 0.8,
          fillOpacity: 0.7
        }).addTo(map).bindPopup(`<b>${b.name}</b><br>Fill: ${b.fill}%`);
      });
    }

    function resolveAlert(name) {
      bins = bins.map(b => b.name === name ? {...b, fill: 0} : b);
      updateLiveData();
    }

    function exportReport() {
      const report = `Smart Waste Management Report
Coimbatore Division - ${new Date().toLocaleDateString()}

Summary:
- Total Bins Monitored: ${bins.length}
- Critical Alerts: ${bins.filter(b=>b.fill>80).length}
- Efficiency: ${Math.round((1 - bins.filter(b=>b.fill>80).length/bins.length)*100)}%

Top Alerts:
${bins.filter(b=>b.fill>80).slice(0,10).map(b=>`• ${b.name}: ${b.fill}%`).join('\n')}`;
      
      const blob = new Blob([report], {type: 'text/plain;charset=utf-8'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `waste-report-${Date.now()}.txt`;
      link.click();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      const ctxFill = document.getElementById('fillChart').getContext('2d');
      fillChart = new Chart(ctxFill, {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Fill Level %', data: [], backgroundColor: '#10b981', borderRadius: 8 }] },
        options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
      });

      const ctxStatus = document.getElementById('statusChart').getContext('2d');
      statusChart = new Chart(ctxStatus, {
        type: 'doughnut',
        data: { labels: [], datasets: [{ data: [], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
      });

      updateLiveData();
      setInterval(updateLiveData, 5000);
    });
  </script>
</body>
</html>
