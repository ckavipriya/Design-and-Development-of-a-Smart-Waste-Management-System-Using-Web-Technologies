<!DOCTYPE html>
<html>
<head>

<title>AI Waste Assistant</title>
<link rel="stylesheet" href="style.css">

<style>

.chat-container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

#chatbox{
height:300px;
overflow-y:auto;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
background:#0f766e;
color:white;
border:none;
}

.user{
color:blue;
margin:5px 0;
}

.bot{
color:green;
margin:5px 0;
}

</style>

</head>

<body>

<header>

<h1>Smart Waste Management</h1>

<nav>
<a href="index.html">Home</a>
<a href="status.html">Bin Status</a>
<a href="report.html">Report Waste</a>
<a href="contact.html">Contact</a>
<a href="chatbot.html">AI Chatbot</a>
</nav>

</header>

<div class="chat-container">

<h2>AI Waste Assistant</h2>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Ask about waste management">

<button onclick="sendMessage()">Send</button>

</div>

<script>

function sendMessage(){

var input = document.getElementById("userInput").value;
var chatbox = document.getElementById("chatbox");

chatbox.innerHTML += "<div class='user'>You: " + input + "</div>";

var reply = "I can help with waste reporting and smart bin information.";

if(input.toLowerCase().includes("bin"))
reply="Smart bins use sensors to detect garbage levels.";

if(input.toLowerCase().includes("report"))
reply="You can report waste problems using the Report page.";

if(input.toLowerCase().includes("contact"))
reply="Please check the contact page for support.";

chatbox.innerHTML += "<div class='bot'>Bot: " + reply + "</div>";

document.getElementById("userInput").value="";

}

</script>

</body>
</html>
