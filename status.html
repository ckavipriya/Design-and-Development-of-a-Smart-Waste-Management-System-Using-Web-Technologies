<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bin Status</title>
  <link rel="stylesheet" href="style.css">
  <style>.full {color: red;} .medium {color: orange;} .empty {color: green;}</style>
  <!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="3d-bin" style="width: 400px; height: 400px; border-radius: 24px; overflow: hidden; margin: 2rem auto; border: 2px solid rgba(255,255,255,0.2);"></div>

<script>
// 3D Bin Visualizer
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(400, 400);
document.getElementById('3d-bin').appendChild(renderer.domElement);

const geometry = new THREE.CylinderGeometry(1, 1, 3, 32);
const material = new THREE.MeshBasicMaterial({ color: 0x10b981, transparent: true, opacity: 0.8 });
const bin = new THREE.Mesh(geometry, material);
scene.add(bin);

camera.position.z = 5;

// Animate fill level
function animate() {
  requestAnimationFrame(animate);
  bin.scale.y = (wm.bins[0]?.level || 50) / 100; // Live fill
  bin.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();
</script>
</head>
<body>
  <header><h1>Bin Status</h1><a href="index.html">Home</a></header>
  <div class="container">
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>Location</th><th>Fill Level</th><th>Status</th></tr></thead>
        <tbody id="statusTable"></tbody>
      </table>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
