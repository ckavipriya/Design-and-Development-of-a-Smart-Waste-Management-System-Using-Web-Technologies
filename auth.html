<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Smart Waste Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="signup">Sign Up</button>
            <button class="tab-btn" data-tab="forgot">Forgot Password</button>
        </div>

        <!-- Signup Tab -->
        <div class="auth-card active" id="signup">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Create Account</h2>
                <p>Join SmartWaste Pro today</p>
            </div>
            <form class="auth-form">
                <div class="input-group icon-left">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group icon-left">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group icon-left">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="input-group icon-left">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn-primary w-full">Create Account</button>
            </form>
        </div>

        <!-- Forgot Password Tab -->
        <div class="auth-card" id="forgot">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h2>Reset Password</h2>
                <p>Enter your email to receive reset instructions</p>
            </div>
            <form class="auth-form">
                <div class="input-group icon-left">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <button type="submit" class="btn-primary w-full">Send Reset Link</button>
                <a href="login.html" class="btn-secondary w-full">Back to Login</a>
            </form>
        </div>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.auth-card').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });

        // Form submits
        document.querySelectorAll('.auth-form').forEach(form => {
            form.onsubmit = e => {
                e.preventDefault();
                alert('Action completed! Check your email.');
            };
        });
    </script>
</body>
</html>
