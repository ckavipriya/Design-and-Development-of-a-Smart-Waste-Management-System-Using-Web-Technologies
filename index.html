<!DOCTYPE html>
<html>
<head>
  <title>SmartWaste Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8 text-white">
  <div class="text-center max-w-2xl">
    <h1 class="text-6xl font-black mb-8 drop-shadow-2xl">SmartWaste Pro</h1>
    <p class="text-2xl mb-12 opacity-90">Professional Waste Management System</p>
    <a href="login.html" class="bg-white text-emerald-600 px-12 py-6 rounded-3xl font-bold text-xl hover:shadow-2xl hover:scale-105 transition-all inline-block">
      🚀 Get Started Free
    </a>
    <p class="mt-8 text-lg opacity-75">By Kavipriya | VSB Engineering College</p>
  </div>

  <!-- INLINE CHATBOT - NO EXTERNAL FILES -->
  <button onclick="toggleChat()" id="chatToggle" style="position:fixed;bottom:30px;right:30px;width:70px;height:70px;background:#10b981;border-radius:50%;border:none;color:white;font-size:24px;cursor:pointer;z-index:1000;box-shadow:0 10px 30px rgba(16,185,129,0.4);">🤖</button>
  <div id="chatWindow" style="position:fixed;bottom:120px;right:20px;width:350px;height:400px;background:rgba(15,23,42,0.95);border-radius:20px;display:none;z-index:1001;overflow:hidden;">
    <div style="background:#1e293b;padding:20px;display:flex;justify-content:space-between;align-items:center;">
      <span style="color:white;font-weight:bold;">WasteBot 🤖</span>
      <button onclick="toggleChat()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">×</button>
    </div>
    <div id="chatMessages" style="height:280px;overflow-y:auto;padding:20px;color:white;font-size:14px;"></div>
    <div style="padding:20px;display:flex;gap:10px;">
      <input id="chatInput" placeholder="Ask about bins..." style="flex:1;padding:12px;border-radius:20px;border:1px solid #475569;background:#1e293b;color:white;outline:none;" onkeypress="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()" style="width:45px;height:45px;background:#10b981;border:none;border-radius:50%;color:white;cursor:pointer;">→</button>
    </div>
  </div>
</body>
<script>
let chatOpen = false;
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatWindow').style.display = chatOpen ? 'block' : 'none';
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  
  addChatMsg(msg, 'user');
  input.value = '';
  
  // Smart replies
  setTimeout(() => {
    const replies = {
      'status': '📊 Bins: Ambattur 85%🔴 Karur 45%🟡 Chennai 15%🟢',
      'schedule': '🗓️ Mon/Wed/Fri 7AM pickup',
      'help': 'Ask: status, schedule, types',
      'types': '♻️ Green=Organic Blue=Plastic Yellow=Paper',
      'tcs': '🎯 TCS: Java+DSA+SQL. Practice LeetCode!'
    };
    const reply = replies[msg.toLowerCase()] || 'Great question! Try "status" 📈';
    addChatMsg(reply, 'bot');
  }, 800);
}

function addChatMsg(text, type) {
  const messages = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.style.cssText = type === 'user' ? 
    'background:#3b82f6;color:white;padding:12px;border-radius:18px 18px 6px 18px;margin-left:auto;max-width:80%;margin-bottom:10px;' :
    'background:rgba(255,255,255,0.1);color:white;padding:12px;border-radius:18px 18px 18px 6px;max-width:80%;margin-bottom:10px;';
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
</script>
</html>
