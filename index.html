<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste Management System - Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-recycle"></i>
                <span>SmartWaste Pro</span>
            </div>
            <nav>
                <a href="index.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="report.html"><i class="fas fa-chart-bar"></i> Reports</a>
                <a href="admin.html"><i class="fas fa-user-cog"></i> Admin</a>
                <a href="status.html"><i class="fas fa-map-marker-alt"></i> Map</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="topbar">
                <h1>Dashboard</h1>
                <div class="user-controls">
                    <button id="modeToggle" class="btn-icon" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="notification">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <button id="profileBtn" class="btn-profile">
                        Admin <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </header>

            <div class="content">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon critical"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="stat-info">
                            <h3>12</h3>
                            <p>Critical Bins</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon warning"><i class="fas fa-exclamation-circle"></i></div>
                        <div class="stat-info">
                            <h3>28</h3>
                            <p>Warning</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon success"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <h3>10</h3>
                            <p>Optimal</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon info"><i class="fas fa-info-circle"></i></div>
                        <div class="stat-info">
                            <h3>95%</h3>
                            <p>Avg Fill</p>
                        </div>
                    </div>
                </div>

                <!-- Charts & Bins -->
                <div class="grid-2">
                    <div class="panel">
                        <h2>Live Bin Status</h2>
                        <div class="bins-container" id="binsContainer">
                            <!-- Dynamic bins loaded by JS -->
                        </div>
                    </div>
                    <div class="panel">
                        <h2>Fill Rate Chart</h2>
                        <canvas id="fillChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Auth Modals -->
    <div id="signInModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-sign-in-alt"></i> Sign In</h3>
                <span class="close">&times;</span>
            </div>
            <form>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary w-full">Login</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
