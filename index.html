<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste Management Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header glass">
            <h1>🗑️ Smart Waste Pro</h1>
            <div class="controls">
                <button id="modeToggle" class="btn-icon">🌙</button>
                <button id="signInBtn" class="btn-primary">Sign In</button>
                <button id="signUpBtn" class="btn-secondary">Sign Up</button>
            </div>
        </header>

        <main class="dashboard-grid">
            <div class="card glass full">
                <div class="icon">🟥</div>
                <h3>Bin 1</h3>
                <div class="level high">95%</div>
                <div class="progress"><div class="progress-bar high"></div></div>
            </div>
            <div class="card glass okay">
                <div class="icon">🟡</div>
                <h3>Bin 2</h3>
                <div class="level med">45%</div>
                <div class="progress"><div class="progress-bar med"></div></div>
            </div>
            <div class="card glass empty">
                <div class="icon">🟢</div>
                <h3>Bin 3</h3>
                <div class="level low">15%</div>
                <div class="progress"><div class="progress-bar low"></div></div>
            </div>
            <div class="card glass stats">
                <h3>Total Bins: 50</h3>
                <p>Full: 12 | Need Service: 8</p>
            </div>
        </main>
    </div>

    <!-- Modals same as before -->
    <div id="signInModal" class="modal">
        <div class="modal-content glass">
            <span class="close">&times;</span>
            <h2>🔐 Sign In</h2>
            <form class="form-modern">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-primary full">Sign In</button>
            </form>
        </div>
    </div>

    <div id="signUpModal" class="modal">
        <div class="modal-content glass">
            <span class="close">&times;</span>
            <h2>📝 Sign Up</h2>
            <form class="form-modern">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-primary full">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
