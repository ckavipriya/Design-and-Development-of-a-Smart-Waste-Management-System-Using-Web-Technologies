<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Waste Management System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header Section -->
  <header>
    <h1>Smart Waste Management System</h1>
    <p>Efficiently monitor and manage your waste collection</p>
  </header>

  <!-- Hero Section -->
  <section id="hero">
    <h2>Welcome to a Cleaner Future</h2>
    <p>Use our system to track bins, collection schedules, and recycling guidelines.</p>
  </section>

  <!-- AI Contact Section -->
  <section id="contact">
    <h2>Contact & AI Assistant</h2>

    <form id="aiForm" onsubmit="askAI(event)">
      <input type="text" id="question" placeholder="Ask AI here..." required>
      <button type="submit">Send</button>
    </form>

    <div id="answer"></div>
    <div id="formMessage"></div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Smart Waste Management System. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
