<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Waste Mgmt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-xl">
    <h1 class="text-3xl font-bold mb-6 text-center">Smart Waste Management</h1>
    <form id="loginForm" class="space-y-4">
      <input type="email" placeholder="Email" class="w-full p-3 border rounded-lg">
      <select class="w-full p-3 border rounded-lg">
        <option>Admin</option>
        <option>Collector</option>
        <option>Citizen</option>
      </select>
      <input type="password" placeholder="Password" class="w-full p-3 border rounded-lg">
      <button type="submit" class="w-full bg-green-500 text-white p-3 rounded-lg font-bold">Login</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').onsubmit = (e) => {
      e.preventDefault();
      window.location.href = 'admin.html'; // Or based on role
    };
  </script>
</body>
</html>
