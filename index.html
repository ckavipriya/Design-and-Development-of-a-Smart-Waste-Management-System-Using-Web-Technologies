<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste | AI Assistant</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-recycle"></i> SmartWaste
        </div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#status">Status</a>
            <a href="#report">Report</a>
            <a href="#contact" class="active">Contact</a>
        </div>
    </nav>

    <main class="main-container">
        <div class="glass-card">
            <div class="card-header">
                <i class="fas fa-robot"></i>
                <h1>Contact & AI Assistant</h1>
                <p>How can I help you manage waste today?</p>
            </div>

            <div class="chat-display" id="chatWindow">
                <div class="message ai-message">
                    Hello! I'm your Smart Waste Assistant. Ask me about pickup schedules or recycling tips!
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message here...">
                <button type="button" class="send-btn">
                    <span>Send</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 <strong>Smart Waste Management System</strong>. All rights reserved.</p>
    </footer>

</body>
</html>
