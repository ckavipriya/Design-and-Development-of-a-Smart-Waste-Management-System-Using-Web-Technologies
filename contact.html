<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Smart Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen pt-20">
  <div class="container">
    <div class="card max-w-2xl mx-auto">
      <h1 class="text-4xl font-bold mb-8 text-center text-gray-800">Contact Support</h1>
      <form class="space-y-6">
        <input type="text" placeholder="Name" class="w-full p-4 border rounded-lg">
        <input type="email" placeholder="Email" class="w-full p-4 border rounded-lg">
        <textarea placeholder="Message" rows="5" class="w-full p-4 border rounded-lg"></textarea>
        <button type="submit" class="btn w-full text-lg py-4">Send Message</button>
      </form>
      <div class="mt-12 text-center text-gray-600">
        <p>📧 support@smartwaste.com</p>
        <p>📱 +91-XXXXXXX</p>
        <p>📍 Madurai, Tamil Nadu</p>
      </div>
    </div>
  </div>
  <script>document.querySelector('form').onsubmit = e => { e.preventDefault(); alert('Message sent! 🚀'); };</script>
</body>
</html>
