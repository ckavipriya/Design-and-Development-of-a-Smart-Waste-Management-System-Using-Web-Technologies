<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Smart Waste Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">Smart Waste</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="status.html">Status</a></li>
    <li><a href="report.html">Report</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="ai-assistant.html">AI Assistant</a></li>
  </ul>
</nav>

<section class="page-header">
  <h1>Contact Us</h1>
  <p>Fill the form below to get in touch with us.</p>
</section>

<section class="contact-form-container">
  <form id="contactForm">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message" rows="5" required></textarea>
    <button type="submit">Send Message</button>
  </form>
  <div id="formMessage" class="chat-bubble"></div>
</section>

<footer>
  <p>&copy; 2026 Smart Waste Management System. All rights reserved.</p>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("formMessage").innerText = "Your message has been sent successfully!";
  this.reset();
});
</script>

</body>
</html>
